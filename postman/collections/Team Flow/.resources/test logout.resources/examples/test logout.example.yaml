$kind: http-example
request:
  url: "{{base_url}}/logout"
  method: POST
  headers:
    Accept: application/json
    Authorization: Bearer {{token}}
  body:
    type: text
    content: "{\r

      \  \"email\": \"mounia@test.com\",\r

      \  \"password\": \"mounia\"\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    Host: 127.0.0.1:8000
    Connection: close
    X-Powered-By: PHP/8.2.29
    Cache-Control: no-cache, private
    Date: Tue, 24 Mar 2026 14:20:30 GMT
    Content-Type: application/json
    Access-Control-Allow-Origin: "*"
  body:
    type: text
    content: |-
      {
          "message": "Logged out successfully"
      }
order: 1000
