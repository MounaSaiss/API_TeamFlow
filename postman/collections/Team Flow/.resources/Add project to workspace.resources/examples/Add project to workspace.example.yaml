$kind: http-example
request:
  url: "{{base_url}}/workspaces/1/projects"
  method: POST
  headers:
    Accept: application/json
    Authorization: Bearer {{token}}
  body:
    type: json
    content: "{\r\n    \"name\": \"Project1\"\r\n}"
response:
  statusCode: 200
  statusText: OK
  headers:
    Host: 127.0.0.1:8000
    Connection: close
    X-Powered-By: PHP/8.2.29
    Cache-Control: no-cache, private
    Date: Thu, 26 Mar 2026 14:49:52 GMT
    Content-Type: application/json
    Access-Control-Allow-Origin: "*"
  body:
    type: text
    content: |-
      {
          "message": "Project created ",
          "project": {
              "name": "Project1",
              "workspace_id": "1",
              "user_id": 1,
              "updated_at": "2026-03-26T14:49:52.000000Z",
              "created_at": "2026-03-26T14:49:52.000000Z",
              "id": 1
          }
      }
order: 1000
