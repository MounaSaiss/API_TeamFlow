$kind: http-example
request:
  url: "{{base_url}}/register"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: "{\r

      \  \"name\": \"mounia\",\r

      \  \"email\": \"mounia@test.com\",\r

      \  \"password\": \"mounia\",\r

      \  \"password_confirmation\": \"mounia\"\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    Host: 127.0.0.1:8000
    Connection: close
    X-Powered-By: PHP/8.2.29
    Cache-Control: no-cache, private
    Date: Tue, 24 Mar 2026 13:16:18 GMT
    Content-Type: application/json
    Access-Control-Allow-Origin: "*"
  body:
    type: text
    content: |-
      {
          "message": "User created successfully",
          "user": {
              "name": "mounia",
              "email": "mounia@test.com",
              "updated_at": "2026-03-24T13:16:18.000000Z",
              "created_at": "2026-03-24T13:16:18.000000Z",
              "id": 1
          }
      }
order: 1000
